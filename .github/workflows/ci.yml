name: CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4   # updated to v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore dependencies
        run: dotnet restore ./ServiceBookingSystem.slnx   # corrected to .slnx
      - name: Build
        run: dotnet build ./ServiceBookingSystem.slnx --no-restore
      - name: Test
        run: dotnet test ./ServiceBookingSystem.Tests/ServiceBookingSystem.Tests.csproj --no-build --verbosity normal

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install --prefix ./FrontendBooking/frontappln
      - name: Build Angular
        run: npm run build --prefix ./FrontendBooking/frontappln
